spring:
  application:
    name: wisecloud-mdm

  datasource:
    url: jdbc:mysql://localhost:3306/wisecloud_mdm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-change-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# WiseCloud SDK Configuration
wisecloud:
  access-key-id: ${WISECLOUD_ACCESS_KEY_ID:}
  access-key-secret: ${WISECLOUD_ACCESS_KEY_SECRET:}
  sandbox: true
