# Development profile — uses H2 in-memory database (no MySQL required)
spring:
  datasource:
    url: jdbc:h2:mem:wisecloud_mdm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: dev-secret-key-for-local-testing-only-must-be-at-least-256-bits-long-enough
  expiration: 86400000

wisecloud:
  access-key-id: dev-access-key
  access-key-secret: dev-access-secret
  sandbox: true
